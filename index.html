<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Ink Signs | Custom Printing, Signage & 3D Fabrication</title>
    <style>
        :root {
            --bg-dark: #0b0f17;
            --bg-card: #161c26;
            --bg-card-hover: #1e2736;
            --accent-orange: #f59e0b;
            --accent-orange-hover: #d97706;
            --accent-green: #22c55e;
            --accent-red: #ef4444;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #232d3d;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition: 0.3s ease;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }

        html { scroll-behavior: smooth; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            background-color: rgba(22, 28, 38, 0.97);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(12px);
            border-bottom: 2px solid var(--accent-orange);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        .logo span { color: var(--accent-orange); }

        nav ul {
            display: flex;
            list-style: none;
            gap: 1.8rem;
            align-items: center;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color var(--transition);
            position: relative;
            padding: 0.3rem 0;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-orange);
            transition: width var(--transition);
        }

        nav a:hover::after, nav a.active::after { width: 100%; }
        nav a:hover, nav a.active { color: var(--accent-orange); }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
            background: none;
            border: none;
            padding: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: var(--text-light);
            border-radius: 3px;
            transition: all var(--transition);
        }

        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }

        .theme-toggle {
            background: none;
            border: 2px solid var(--border-color);
            color: var(--text-light);
            padding: 0.4rem 0.7rem;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all var(--transition);
        }

        .theme-toggle:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
        }

        .page {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem 5rem;
        }

        .page.active-page {
            display: block;
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background-color: var(--accent-orange);
            color: var(--bg-dark);
            padding: 0.85rem 2rem;
            border: none;
            border-radius: 5px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .btn:hover {
            background-color: var(--accent-orange-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.3);
        }

        .btn:active { transform: translateY(0); }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--accent-orange);
            color: var(--accent-orange);
        }

        .btn-outline:hover {
            background: var(--accent-orange);
            color: var(--bg-dark);
        }

        .btn-sm { padding: 0.55rem 1.2rem; font-size: 0.8rem; }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
        }

        .section-title span { color: var(--accent-orange); }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        /* HOME */
        .hero {
            text-align: center;
            padding: 5rem 2rem;
            background: linear-gradient(180deg, #161c26 0%, #0b0f17 100%);
            border-radius: 10px;
            margin-bottom: 4rem;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
            animation: heroGlow 8s ease-in-out infinite alternate;
        }

        @keyframes heroGlow {
            from { transform: translate(0, 0); }
            to { transform: translate(5%, 5%); }
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            line-height: 1.15;
            position: relative;
        }

        .hero h1 span { color: var(--accent-orange); }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 2.5rem;
            position: relative;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            position: relative;
        }

        /* SHOWCASE */
        .showcase-section { margin-bottom: 4rem; }

        .showcase-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .showcase-card {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            background: var(--bg-card);
        }

        .showcase-card:hover {
            border-color: var(--accent-orange);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(245, 158, 11, 0.1);
        }

        .showcase-img-wrap {
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: linear-gradient(135deg, #1a2332, #0d1117);
        }

        .showcase-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .showcase-card:hover .showcase-img { transform: scale(1.05); }

        .showcase-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            background: linear-gradient(135deg, #1a2332, #0d1117);
        }

        .showcase-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(0deg, rgba(11, 15, 23, 0.95) 0%, rgba(11, 15, 23, 0.7) 50%, transparent 100%);
            padding: 2rem 1.5rem 1.5rem;
        }

        .showcase-badge {
            display: inline-block;
            background: var(--accent-orange);
            color: var(--bg-dark);
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.6rem;
        }

        .showcase-overlay h3 {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 0.3rem;
            color: var(--text-light);
        }

        .showcase-overlay p {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-item {
            background: var(--bg-card);
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all var(--transition);
        }

        .stat-item:hover {
            border-color: var(--accent-orange);
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--accent-orange);
            display: block;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.3rem;
        }

        .editorial-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .editorial-card {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 8px;
            border-top: 4px solid var(--accent-orange);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            transition: all var(--transition);
            cursor: pointer;
        }

        .editorial-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .editorial-card h3 { margin-bottom: 1rem; font-size: 1.2rem; color: var(--text-light); }
        .editorial-card p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1.2rem; }

        .read-more {
            color: var(--accent-orange);
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: none;
            background: none;
            transition: all var(--transition);
        }

        .read-more:hover { letter-spacing: 2px; }

        /* SERVICES */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background-color: var(--bg-card);
            padding: 2.5rem 2rem;
            border-radius: 8px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all var(--transition);
            cursor: pointer;
        }

        .service-card:hover {
            border-color: var(--accent-orange);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.1);
        }

        .service-icon { font-size: 3rem; margin-bottom: 1.2rem; display: block; }
        .service-card h3 { margin-bottom: 0.8rem; font-size: 1.15rem; }
        .service-card p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; }
