name: generate

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Image prompt'
        required: true
        default: 'A futuristic cybernetic owl perched on a branch'
      filename:
        description: 'Output filename (without extension)'
        required: true
        default: 'flux-output'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Image Generation Script
      env:
        HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        IMAGE_PROMPT: ${{ github.event.inputs.prompt }}
        OUTPUT_FILENAME: ${{ github.event.inputs.filename }}
      run: python scripts/generate_images.py

    - name: Commit and Push Generated Image
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add output/*.png
        git commit -m "Add generated image: ${{ github.event.inputs.filename }}"
        git push
