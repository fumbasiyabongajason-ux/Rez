name: FLUX Image Generation

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Text prompt for the image'
        required: true
        default: 'A futuristic cybernetic owl, digital art'
      filename:
        description: 'Output filename (without extension)'
        required: true
        default: 'flux-output'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Call FLUX API and Save Image
      run: |
        mkdir -p output
        curl -X POST "https://huggingface.co" \
          -H "Authorization: Bearer ${{ secrets.HF_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d "{\"inputs\": \"${{ github.event.inputs.prompt }}\"}" \
          --output output/${{ github.event.inputs.filename }}.png

    - name: Commit and Push Image
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@://github.com"
        git add output/*.png
        git commit -m "Add generated image" || echo "No changes"
        git push
