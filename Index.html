<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rest Ink Signs | Custom Printing, Signage & 3D Fabrication</title>
    <style>
        /* Design System: Premium Ink Black & Vibrant Amber/Orange */
        :root {
            --bg-dark: #0b0f17;
            --bg-card: #161c26;
            --accent-orange: #f59e0b;
            --accent-orange-hover: #d97706;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --font-main: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: var(--font-main);
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
        }

        /* Responsive Navigation Bar */
        header {
            background-color: rgba(22, 28, 38, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--accent-orange);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo span {
            color: var(--accent-orange);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent-orange);
        }

        /* Layout & Animation Control */
        .page {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
            animation: slideUp 0.4s ease-out forwards;
        }

        .page.active-page {
            display: block;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Custom Interactive Buttons */
        .btn {
            background-color: var(--accent-orange);
            color: var(--bg-dark);
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 4px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--accent-orange-hover);
            transform: translateY(-2px);
        }

        .section-title {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-align: center;
            text-transform: uppercase;
            font-weight: 800;
        }

        .section-title span {
            color: var(--accent-orange);
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 3.5rem;
            font-size: 1.1rem;
        }

        /* PAGE 1: HERO & PRODUCTION EDITORIALS */
        .hero {
            text-align: center;
            padding: 5rem 1.5rem;
            background: linear-gradient(180deg, #161c26 0%, #0b0f17 100%);
            border-radius: 8px;
            margin-bottom: 4rem;
            border: 1px solid #232d3d;
        }

        .hero h1 {
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            max-width: 850px;
            margin: 0 auto 2.5rem;
        }

        .editorial-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            margin-top: 1rem;
        }

        .editorial-card {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 6px;
            border-top: 4px solid var(--accent-orange);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }

        .editorial-card h3 {
            margin-bottom: 1rem;
            font-size: 1.3rem;
            color: var(--text-light);
        }

        /* PAGE 2: SERVICES & ABOUT */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .service-card {
            background-color: var(--bg-card);
            padding: 2.5rem 2rem;
            border-radius: 6px;
            text-align: center;
            border: 1px solid #232d3d;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            border-color: var(--accent-orange);
            transform: translateY(-5px);
        }

        .service-icon {
            font-size: 3rem;
            margin-bottom: 1.2rem;
            display: block;
        }

        .about-story {
            margin-top: 5rem;
            background-color: var(--bg-card);
            padding: 3.5rem;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 4rem;
            align-items: center;
            border: 1px solid #232d3d;
        }

        @media (max-width: 768px) {
            .about-story { grid-template-columns: 1fr; padding: 2rem; }
        }

        /* PAGE 3: ORDER BOOKING & LOGISTICS SHIPPING */
        .booking-split {
            display: grid;
            grid-template-columns: 1.1fr 0.9fr;
            gap: 4rem;
        }

        @media (max-width: 768px) {
            .booking-split { grid-template-columns: 1fr; }
        }

        form {
            background-color: var(--bg-card);
            padding: 3rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            border: 1px solid #232d3d;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        label {
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-light);
        }

        input, select, textarea {
            background-color: var(--bg-dark);
            border: 1px solid #232d3d;
            padding: 0.9rem;
            border-radius: 4px;
            color: var(--text-light);
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-orange);
        }

        .shipping-hub {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .courier-card {
            background-color: var(--bg-card);
            padding: 2.5rem;
            border-radius: 8px;
            border: 1px solid #232d3d;
            position: relative;
            overflow: hidden;
        }

        .courier-badge {
            background-color: #ffcc00;
            color: #111111;
            padding: 0.6rem 1.2rem;
            border-radius: 4px;
            font-weight: 900;
            display: inline-block;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* NEW ADDITION: PAGE 4 - EDITORIALS & REVIEWS HUB */
        .reviews-layout {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 3rem;
        }

        @media (max-width: 992px) {
            .reviews-layout { grid-template-columns: 1fr; }
        }

        .editorial-stream, .user-reviews-stream {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .hub-card {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 6px;
            border: 1px solid #232d3d;
        }

        .hub-card .meta {
            font-size: 0.85rem;
            color: var(--accent-orange);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            display: block;
        }

        .hub-card h3 {
            font-size: 1.4rem;
            margin-bottom: 0.8rem;
            color: var(--text-light);
        }

        .hub-card p {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .star-rating {
            color: var(--accent-orange);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
        }

        .reviewer-name {
            font-weight: 700;
            color: var(--text-light);
            display: inline-block;
            margin-right: 0.5rem;
        }

        .verified-badge {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--accent-orange);
            font-size: 0.75rem;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* Footer System */
        footer {
            text-align: center;
            padding: 4rem 1rem;
            margin-top: 6rem;
            border-top: 1px solid #232d3d;
            background-color: #080c12;
            color: var(--text-muted);
